<!DOCTYPE html>
<html>
<head>
  <title>Register Face - Smart Face Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .progress-capture {
        height: 10px;
        background-color: var(--bs-gray-200);
        border-radius: 5px;
        overflow: hidden;
        margin-top: 10px;
    }
    .progress-bar-custom {
        height: 100%;
        background-color: var(--crimson);
        width: 0%;
        transition: width 0.3s ease;
    }
  </style>
</head>
<body>

<div class="container py-4">

  <!-- HEADER -->
  <div class="top-bar d-flex justify-content-between align-items-center flex-wrap">
    <div>
      <h3>Register New Face</h3>
      <div class="text-muted">Train the AI model directly from your webcam</div>
    </div>
    <div class="d-flex gap-2 align-items-center mt-3 mt-md-0">
      <span class="text-muted small">Logged in: {{ current_user.email }}</span>
      <a href="/" class="btn btn-outline-crimson btn-sm">Home</a>
      <a href="/logout" class="btn btn-crimson btn-sm">Logout</a>
    </div>
  </div>

  <div class="row mt-4 justify-content-center">
    <div class="col-md-8">
      <div class="custom-card">
        
        <div class="mb-3">
            <label for="personName" class="form-label fw-bold">Name of Person to Register</label>
            <input type="text" class="form-control form-control-lg" id="personName" placeholder="Enter full name" required>
        </div>

        <div class="mb-3">
            <label for="rollNo" class="form-label fw-bold">Roll Number</label>
            <input type="text" class="form-control form-control-lg" id="rollNo" placeholder="Enter roll number (must be unique)" required>
            <div id="rollNoFeedback" class="mt-1 small"></div>
        </div>

        <div class="camera-container text-center mt-4">
            <video id="videoElement" autoplay playsinline muted class="w-100 rounded bg-dark" style="min-height: 300px; max-height: 480px; object-fit: cover;"></video>
            
            <div class="progress-capture mt-3 d-none" id="progressContainer">
                <div class="progress-bar-custom" id="progressBar"></div>
            </div>
            <p id="statusText" class="mt-2 text-muted fw-bold">Camera Ready</p>

            <button class="btn btn-crimson btn-lg w-100 mt-2" id="startBtn" onclick="startRegistration()">
                Start 10-Picture Capture
            </button>
        </div>

      </div>
    </div>
  </div>

</div>

<!-- Hidden canvas for capturing frames -->
<canvas id="canvas" class="d-none"></canvas>

<script>
const video = document.getElementById('videoElement');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const nameInput = document.getElementById('personName');
const rollNoInput = document.getElementById('rollNo');
const rollNoFeedback = document.getElementById('rollNoFeedback');
const statusText = document.getElementById('statusText');
const progressContainer = document.getElementById('progressContainer');
const progressBar = document.getElementById('progressBar');

const TOTAL_CAPTURES = 10;
const CAPTURE_INTERVAL_MS = 500;
let capturedImages = [];
let captureCount = 0;
let captureInterval;
let rollNoValid = false;

// Initialize Camera
function startCamera() {
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(function (stream) {
                video.srcObject = stream;
            })
            .catch(function (error) {
                console.error("Error accessing camera:", error);
                statusText.innerText = "Error: Cannot access camera! Please grant permissions.";
                startBtn.disabled = true;
            });
    } else {
        statusText.innerText = "Error: Camera API not supported in this browser.";
        startBtn.disabled = true;
    }
}

startCamera();

// Check roll number uniqueness when user leaves the field
let checkTimeout;
rollNoInput.addEventListener('input', function() {
    clearTimeout(checkTimeout);
    const rollNo = rollNoInput.value.trim();
    
    if (!rollNo) {
        rollNoFeedback.innerHTML = '';
        rollNoValid = false;
        return;
    }

    rollNoFeedback.innerHTML = '<span class="text-muted">Checking...</span>';

    checkTimeout = setTimeout(() => {
        fetch('/check_roll_no', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roll_no: rollNo })
        })
        .then(res => res.json())
        .then(data => {
            if (data.exists) {
                rollNoFeedback.innerHTML = '<span class="text-danger fw-bold">Roll number already registered</span>';
                rollNoValid = false;
            } else {
                rollNoFeedback.innerHTML = '<span class="text-success fw-bold">Roll number available</span>';
                rollNoValid = true;
            }
        });
    }, 400);
});

function startRegistration() {
    const name = nameInput.value.trim();
    const rollNo = rollNoInput.value.trim();

    if (!name) {
        alert("Please enter a name first!");
        nameInput.focus();
        return;
    }
    if (!rollNo) {
        alert("Please enter a roll number!");
        rollNoInput.focus();
        return;
    }
    if (!rollNoValid) {
        alert("Roll number is already registered or not yet validated!");
        rollNoInput.focus();
        return;
    }

    // Reset state
    capturedImages = [];
    captureCount = 0;
    startBtn.disabled = true;
    nameInput.disabled = true;
    rollNoInput.disabled = true;
    progressContainer.classList.remove('d-none');
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    statusText.innerText = `Preparing to capture ${name} (${rollNo})... Look at the camera!`;
    
    setTimeout(captureFrames, 1000);
}

function captureFrames() {
    captureInterval = setInterval(() => {
        if (captureCount < TOTAL_CAPTURES) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.9);
            capturedImages.push(imageData);
            
            captureCount++;
            
            progressBar.style.width = `${(captureCount / TOTAL_CAPTURES) * 100}%`;
            statusText.innerText = `Captured ${captureCount} / ${TOTAL_CAPTURES}... Keep still...`;
            
        } else {
            clearInterval(captureInterval);
            statusText.innerText = `Finished capturing! Uploading dataset and training... Please wait...`;
            sendDataToServer();
        }
    }, CAPTURE_INTERVAL_MS);
}

function sendDataToServer() {
    const name = nameInput.value.trim();
    const rollNo = rollNoInput.value.trim();
    
    fetch('/register_face', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            name: name,
            roll_no: rollNo,
            images: capturedImages
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            statusText.innerHTML = `<span class="text-success">${data.message}</span>`;
            setTimeout(() => {
                alert("Face registered successfully! Redirecting to home...");
                window.location.href = "/";
            }, 2000);
        } else {
            statusText.innerHTML = `<span class="text-danger">Error: ${data.message}</span>`;
            resetForm();
        }
    })
    .catch((error) => {
        console.error('Error:', error);
        statusText.innerHTML = `<span class="text-danger">Network Error. Make sure the server is running.</span>`;
        resetForm();
    });
}

function resetForm() {
    startBtn.disabled = false;
    startBtn.innerText = "Try Again";
    nameInput.disabled = false;
    rollNoInput.disabled = false;
}
</script>

</body>
</html>
